<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday 💖</title>
<style>
body{
  margin:0;
  background:black;
  color:white;
  text-align:center;
  font-family:sans-serif;
}
img{
  width:200px;
  margin:10px;
}
</style>
</head>

<body>

<h1>💖 Happy Birthday Sayang 💖</h1>

<img src="foto1.jpg">
<img src="foto2.jpg">

<p id="text"></p>

<button onclick="start()">Klik 💖</button>
<button onclick="playMusic()">Play 🎶</button>

<audio id="music">
  <source src="music.mp3">
</audio>

<script>
let text="haiii afellll sayanggg, happy level up yaa sayanggg ❤️";
let i=0;

function start(){
  document.getElementById("text").innerHTML="";
  i=0;
  ketik();
}

function ketik(){
  if(i<text.length){
    document.getElementById("text").innerHTML+=text[i];
    i++;
    setTimeout(ketik,50);
  }
}

function playMusic(){
  document.getElementById("music").play();
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBD AFELL 💖</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  text-align:center;
  background: linear-gradient(135deg,#ff758c,#ff7eb3);
  color:white;
  overflow:hidden;
}

h1 {
  margin-top:30px;
}

img {
  width:120px;
  height:120px;
  border-radius:50%;
  margin:10px;
  border:3px solid white;
  object-fit:cover;
}

/* typing effect */
#text {
  margin:20px;
  font-size:18px;
  min-height:120px;
}

/* button */
button {
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:white;
  color:#ff4d6d;
  font-weight:bold;
}

/* confetti */
.confetti {
  position:fixed;
  width:8px;
  height:8px;
  top:0;
  animation:fall linear infinite;
}

@keyframes fall {
  to {
    transform:translateY(100vh) rotate(360deg);
  }
}
</style>

</head>
<body>

<h1>🎉 Happy Birthday Sayang 💖</h1>

<img src="foto1.jpg">
<img src="foto2.jpg">

<div id="text"></div>

<button onclick="playMusic()">Play Music 🎶</button>

<audio id="music">
  <source src="music.mp3" type="audio/mp3">
</audio>

<script>
// typing effect
const message = "haiii afellll sayanggg, happy level up yaa sayanggg, semogaa semua impian kamu tercapai, jadi pribadi yang lebih dewasa, dan tetap semangat yaa 💖 aca selalu doain kamu";

let index = 0;

function startTyping() {
  if (index < message.length) {
    document.getElementById("text").innerHTML += message.charAt(index);
    index++;
    setTimeout(startTyping, 50);
  }
}

window.onload = function() {
  startTyping();

  // confetti
  for (let i = 0; i < 40; i++) {
    let c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random()*100 + "vw";
    c.style.background = "hsl(" + Math.random()*360 + ",100%,50%)";
    c.style.animationDuration = (Math.random()*3 + 2) + "s";
    document.body.appendChild(c);
  }
}

// music
function playMusic(){
  document.getElementById("music").play();
}
</script>

</body>
</html>
